---
- name: Wipe web application resources
  block:
    - name: Stop and remove compose stack
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: absent
      ignore_errors: true

    - name: Remove docker-compose file
      ansible.builtin.file:
        path: "{{ compose_project_dir }}/docker-compose.yml"
        state: absent

    - name: Remove compose project directory
      ansible.builtin.file:
        path: "{{ compose_project_dir }}"
        state: absent

    - name: Report wipe completion
      ansible.builtin.debug:
        msg: "Application {{ app_name }} wiped successfully"
  when:
    - web_app_wipe | bool
    - "'web_app_wipe' in ansible_run_tags"
  tags:
    - web_app_wipe
