---
- name: Set up monitoring directories and configs
  block:
    - name: Create monitoring directory structure
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ monitoring_project_dir }}"
        - "{{ monitoring_project_dir }}/loki"
        - "{{ monitoring_project_dir }}/promtail"
        - "{{ monitoring_project_dir }}/grafana/provisioning/datasources"
        - "{{ monitoring_project_dir }}/grafana/provisioning/dashboards"

    - name: Template Loki config
      ansible.builtin.template:
        src: loki-config.yml.j2
        dest: "{{ monitoring_project_dir }}/loki/config.yml"
        mode: "0644"

    - name: Template Promtail config
      ansible.builtin.template:
        src: promtail-config.yml.j2
        dest: "{{ monitoring_project_dir }}/promtail/config.yml"
        mode: "0644"

    - name: Template Grafana datasource provisioning
      ansible.builtin.template:
        src: grafana-datasource.yml.j2
        dest: "{{ monitoring_project_dir }}/grafana/provisioning/datasources/loki.yml"
        mode: "0644"
      notify: Restart grafana

    - name: Copy Grafana dashboard provisioning config
      ansible.builtin.copy:
        src: grafana-dashboards-provisioning.yml
        dest: "{{ monitoring_project_dir }}/grafana/provisioning/dashboards/dashboards.yml"
        mode: "0644"
      notify: Restart grafana

    - name: Copy Grafana app dashboard JSON
      ansible.builtin.copy:
        src: app-logs-dashboard.json
        dest: "{{ monitoring_project_dir }}/grafana/provisioning/dashboards/app-logs-dashboard.json"
        mode: "0644"
      notify: Restart grafana

    - name: Template Docker Compose file
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ monitoring_project_dir }}/docker-compose.yml"
        mode: "0644"

  rescue:
    - name: Report setup failure
      ansible.builtin.debug:
        msg: "Monitoring setup failed — check permissions and Docker installation."

  tags: [monitoring]
