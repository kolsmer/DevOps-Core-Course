replicaCount: 3

image:
  tag: "1.0.0"

configEnv:
  environment: "prod"
  logLevel: "warning"

service:
  type: LoadBalancer

persistence:
  size: 1Gi

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 5

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 3
