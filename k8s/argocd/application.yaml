apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-info-lab13
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kolsmer/DevOps-Core-Course.git
    targetRevision: lab13
    path: k8s/devops-info
    helm:
      releaseName: devops-info-lab13
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-lab13
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
